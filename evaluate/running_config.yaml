  # lr:
  early_stopping: true
  # early_stopping_patience:

data_kwargs:
  batch_key: "batch"
  label_key: "cell_type"
  size_factor_key: "size_factor"
  annotation_key: "annotation" # with keys: [clusters, background]

model_kwargs:
  n_topics: 20
  n_clusters: 10

extra_kwargs:
  spectra:
    train_kwargs:
      num_epochs: 10000
      early_stopping_patience: 50
  pycogaps:
    train_kwargs:
      nIterations: 50000
  dcjcomm:
