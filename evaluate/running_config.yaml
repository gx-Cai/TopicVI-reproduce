      batch_size: 0
      n_epochs: 0 # the model may need more epochs than others
  topicvi:
    model_kwargs:
      # topic_decoder_params:
      #   n_topics_without_prior: 25
    data_kwargs:
      setup_kwargs:
  
  # --- 

  scgpt_continous_training:
    model_kwargs: 
